<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дневник настроения</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f7f3ee;
            --text: #2c2420;
            --text-muted: #8a7e74;
            --accent: #c4a882;
            --accent-dark: #a08560;
            --thread-color: #c4b59a;
            --overlay: rgba(44, 36, 32, 0.6);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image:
                radial-gradient(circle at 20% 50%, rgba(196,168,130,0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(196,168,130,0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(196,168,130,0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .page-container {
            z-index: 1;
            max-width: 700px;
            margin: 0 auto;
            padding: 40px 24px 100px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 1s ease-out;
        }

        header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: 3.2rem;
            letter-spacing: 0.04em;
            margin-bottom: 5px;
        }

        header p {
            font-weight: 300;
            font-size: 0.95rem;
            color: var(--text-muted);
            letter-spacing: 0.04em;
        }

        /* Add section */
        .add-section {
            background: linear-gradient(135deg, rgba(255,255,255,0.7), rgba(255,255,255,0.3));
            backdrop-filter: blur(20px);
            border: 1px solid rgba(196,168,130,0.2);
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 50px;
            text-align: center;
            animation: fadeInUp 1s ease-out 0.2s both;
            box-shadow: 0 8px 32px rgba(44,36,32,0.06);
        }

        .add-section h2 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 400;
            font-size: 1.6rem;
            margin-bottom: 8px;
        }

        .add-section .date-display {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-weight: 300;
        }

        .bead-choices {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 28px;
        }

        .bead-choice {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            transition: transform 0.3s ease;
        }

        .bead-choice:hover { transform: scale(1.08); }

        .choice-bead {
            width: 64px; height: 64px;
            border-radius: 50%;
            transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
            position: relative;
        }

        .choice-bead.white {
            background: radial-gradient(circle at 35% 35%, #fff, #f0f0f0, #dfdfdf);
            box-shadow: inset -3px -3px 8px rgba(0,0,0,0.1), inset 3px 3px 8px rgba(255,255,255,0.9), 0 6px 20px rgba(0,0,0,0.15), 0 0 0 1px rgba(255,255,255,0.5);
        }

        .choice-bead.black {
            background: radial-gradient(circle at 35% 35%, #5a5a5a, #2c2c2c, #151515);
            box-shadow: inset -3px -3px 8px rgba(255,255,255,0.1), inset 3px 3px 8px rgba(0,0,0,0.6), 0 6px 20px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1)
        }

        .choice-bead.white::after { background: rgba(0,0,0,0.08); }

        .bead-choice.selected .choice-bead {
            border-color: var(--accent-dark);
            transform: scale(1.1);
            box-shadow: 0 0 0 4px rgba(196,168,130,0.3), 0 8px 24px rgba(44,36,32,0.15);
        }

        .choice-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .comment-area {
            width: 100%;
            max-width: 480px;
            margin: 0 auto 24px;
        }

        .comment-area textarea {
            width: 100%; height: 80px;
            padding: 16px 20px;
            border: 1px solid rgba(196,168,130,0.3);
            border-radius: 16px;
            background: rgba(255,255,255,0.5);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem; font-weight: 300;
            color: var(--text);
            resize: none; outline: none;
            transition: all 0.3s ease;
        }

        .comment-area textarea::placeholder { color: var(--text-muted); opacity: 0.6; }

        .comment-area textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(196,168,130,0.15);
            background: rgba(255,255,255,0.8);
        }

        .add-btn {
            display: inline-flex;
            align-items: center; gap: 8px;
            padding: 14px 36px;
            background: linear-gradient(135deg, var(--accent-dark), var(--accent));
            color: white; border: none;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem; font-weight: 400;
            letter-spacing: 0.06em;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
            box-shadow: 0 4px 16px rgba(160,133,96,0.3);
        }

        .add-btn:hover:not(:disabled) {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 8px 28px rgba(160,133,96,0.4);
        }

        .add-btn:active:not(:disabled) { transform: translateY(0) scale(0.98); }
        .add-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .already-added {
            text-align: center; padding: 20px;
            color: var(--text-muted); font-weight: 300; font-size: 0.95rem;
        }

        .already-added .checkmark {
            display: inline-block;
            width: 48px; height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(130,176,130,0.15), rgba(130,176,130,0.05));
            line-height: 48px; font-size: 1.4rem; margin-bottom: 12px;
        }

        .already-added .edit-link {
            display: inline-block; margin-top: 14px;
            padding: 10px 24px;
            background: rgba(196,168,130,0.12);
            border: 1px solid rgba(196,168,130,0.25);
            border-radius: 50px;
            color: var(--accent-dark);
            font-family: 'Inter', sans-serif;
            font-size: 0.82rem; font-weight: 400;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .already-added .edit-link:hover {
            background: rgba(196,168,130,0.22);
            border-color: rgba(196,168,130,0.45);
            transform: translateY(-1px);
        }

        .edit-badge {
            display: inline-block;
            background: rgba(196,168,130,0.18);
            color: var(--accent-dark);
            font-size: 0.7rem; font-weight: 500;
            letter-spacing: 0.06em; text-transform: uppercase;
            padding: 3px 10px; border-radius: 20px;
            margin-bottom: 14px;
        }

        /* ===== Chain Section ===== */
        .chain-section {
            animation: fadeInUp 1s ease-out 0.4s both;
        }

        .chain-section h2 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 400; font-size: 1.6rem;
            text-align: center; margin-bottom: 12px;
        }

        .chain-stats {
            text-align: center;
            font-size: 0.82rem;
            color: var(--text-muted);
            font-weight: 300;
            margin-bottom: 36px;
            letter-spacing: 0.03em;
        }

        .chain-track {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 60px;
            gap: 10px;
        }

        /* The thread line */
        .thread-line {
            position: absolute;
            left: 50%;
            top: 0;
            width: 2.5px;
            height: 100%;
            transform: translateX(-50%);
            background: var(--thread-color);
            opacity: 0.45;
            border-radius: 2px;
            z-index: 0;
        }

        /* Bead row */
        .bead-row {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        /* Bead */
        .bead-item {
            height: 50px;
            width: 50px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
            z-index: 3;
        }

        .bead-item.has-comment .bead-sphere::before {
            content: '';
            position: absolute;
            top: 2px; right: 2px;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--accent);
            z-index: 4;
            opacity: 50%;
        }

        .bead-sphere:hover {
            transform: scale(1.15);
            z-index: 10;
        }

        .bead-sphere {
            width: 100%; height: 100%;
            border-radius: 50%;
            position: relative;
            transition: all 0.3s ease;
        }

        .bead-sphere.white {
            background: radial-gradient(circle at 35% 35%, #fff, #f0f0f0, #dfdfdf);
            box-shadow: inset -3px -3px 8px rgba(0,0,0,0.1), inset 3px 3px 8px rgba(255,255,255,0.9), 0 6px 20px rgba(0,0,0,0.15), 0 0 0 1px rgba(255,255,255,0.5);
        }

        .bead-sphere.black {
            background: radial-gradient(circle at 35% 35%, #5a5a5a, #2c2c2c, #151515);
            box-shadow: inset -3px -3px 8px rgba(255,255,255,0.1), inset 3px 3px 8px rgba(0,0,0,0.6), 0 6px 20px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1)
        }

        .bead-sphere.white::after {
            background: rgba(0,0,0,0.06);
            box-shadow: inset 0 1px 1px rgba(0,0,0,0.1);
        }

        .bead-sphere.black::after {
            background: rgba(0,0,0,0.3);
            box-shadow: inset 0 1px 1px rgba(0,0,0,0.4);
        }

        .bead-item.is-today .bead-sphere {
            box-shadow: 0 0 0 2px rgba(196,168,130,0.5), 0 2px 8px rgba(44,36,32,0.15);
        }

        /* Date label — positioned absolute inside bead-row */
        .date-label {
            position: absolute;
            right: 70px;
            top: 50%;
            transform: translateY(-50%) translateX(8px);
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 300;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
            white-space: nowrap;
            pointer-events: none;
            letter-spacing: 0.02em;
            font-family: 'Cormorant Garamond', serif;
        }

        .date-label.visible {
            opacity: 1;
            transform: translateY(-50%) translateX(0);
        }

        /* Month labels — fixed to right edge of viewport */
        .month-marker {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            z-index: 5;
        }

        .month-label {
            position: fixed;
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.88rem;
            font-weight: 400;
            color: var(--accent-dark);
            white-space: nowrap;
            letter-spacing: 0.03em;
            right: 24px;
            transform: translateY(-50%);
            pointer-events: none;
            padding-left: 16px;
        }

        /* Month labels — actually positioned absolute to page */
        .month-label-abs {
            position: absolute;
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.88rem;
            font-weight: 400;
            color: var(--accent-dark);
            white-space: nowrap;
            letter-spacing: 0.03em;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        .month-label-abs::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 1.5px;
            background: var(--accent);
            border-radius: 1px;
            opacity: 0.6;
        }

        /* Month ticks container — right side of screen */
        .month-ticks {
            position: absolute;
            top: 0;
            right: -9999px; /* will be repositioned by JS */
            width: 0;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        .month-tick {
            position: absolute;
            right: 0;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .month-tick-line {
            width: 20px;
            height: 1.5px;
            background: var(--accent);
            opacity: 0.4;
            border-radius: 1px;
        }

        .month-tick-label {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.88rem;
            font-weight: 400;
            color: var(--accent-dark);
            letter-spacing: 0.03em;
        }

        @keyframes beadAppear {
            0% { opacity: 0; transform: scale(0) rotate(-180deg); }
            60% { transform: scale(1.3) rotate(10deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        .bead-item.new-bead { animation: beadAppear 0.8s cubic-bezier(0.34,1.56,0.64,1) forwards; }

        @keyframes beadUpdate {
            0% { transform: scale(1); }
            30% { transform: scale(1.4) rotate(15deg); }
            60% { transform: scale(0.9) rotate(-5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        .bead-item.updated-bead { animation: beadUpdate 0.7s cubic-bezier(0.34,1.56,0.64,1); }

        .bead-item.updated-bead { animation: beadUpdate 0.7s cubic-bezier(0.34,1.56,0.64,1); }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--overlay);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0; visibility: hidden;
            transition: all 0.4s ease;
            padding: 24px;
        }

        .modal-overlay.active { opacity: 1; visibility: visible; }

        .modal {
            background: var(--bg);
            border-radius: 24px;
            padding: 40px;
            max-width: 420px; width: 100%;
            transform: scale(0.9) translateY(20px);
            transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
            box-shadow: 0 24px 64px rgba(0,0,0,0.2);
            position: relative;
        }

        .modal-overlay.active .modal { transform: scale(1) translateY(0); }

        .modal-close {
            position: absolute;
            top: 16px; right: 16px;
            width: 36px; height: 36px;
            border-radius: 50%; border: none;
            background: rgba(44,36,32,0.06);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; color: var(--text-muted);
            transition: all 0.3s ease;
        }

        .modal-close:hover { background: rgba(44,36,32,0.12); color: var(--text); }

        .modal-bead {
            display: flex; justify-content: center; margin-bottom: 24px;
        }

        .modal-bead .bead-sphere { width: 56px; height: 56px; }
        .modal-bead .bead-sphere::after { width: 8px; height: 8px; }

        .modal-date {
            text-align: center;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem; font-weight: 400;
            margin-bottom: 6px;
        }

        .modal-mood {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 400;
            margin-bottom: 20px;
        }

        .modal-comment {
            background: rgba(196,168,130,0.08);
            border-radius: 16px;
            padding: 20px;
            font-size: 0.92rem; line-height: 1.7;
            font-weight: 300; font-style: italic;
        }

        .modal-no-comment {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 300; font-style: italic;
            opacity: 0.6;
        }

        .modal-bead-number {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 16px;
            font-weight: 300; opacity: 0.5;
        }

        .modal-actions {
            display: flex;
            justify-content: center;
            gap: 10px; margin-top: 20px;
            flex-wrap: wrap;
        }

        .modal-delete {
            padding: 8px 20px;
            background: none;
            border: 1px solid rgba(180,80,80,0.3);
            border-radius: 50px;
            color: rgba(180,80,80,0.7);
            font-family: 'Inter', sans-serif;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.04em;
        }

        .modal-delete:hover {
            background: rgba(180,80,80,0.08);
            border-color: rgba(180,80,80,0.5);
            color: rgba(180,80,80,0.9);
        }

        .modal-edit-btn {
            padding: 8px 20px;
            background: none;
            border: 1px solid rgba(196,168,130,0.4);
            border-radius: 50px;
            color: var(--accent-dark);
            font-family: 'Inter', sans-serif;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.04em;
        }

        .modal-edit-btn:hover {
            background: rgba(196,168,130,0.12);
            border-color: rgba(196,168,130,0.6);
        }

        .today-badge {
            display: inline-block;
            background: rgba(130,176,130,0.15);
            color: rgba(90,140,90,0.9);
            font-size: 0.68rem; font-weight: 500;
            letter-spacing: 0.08em; text-transform: uppercase;
            padding: 3px 10px; border-radius: 20px;
            margin-bottom: 12px;
        }

        /* Empty */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state .empty-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-state p {
            font-weight: 300;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text);
            color: var(--bg);
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 0.88rem; font-weight: 400;
            z-index: 2000;
            transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            letter-spacing: 0.02em;
        }

        .toast.visible { transform: translateX(-50%) translateY(0); }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .page-container { padding: 28px 12px 80px; }
            header h1 { font-size: 2.4rem; }
            .add-section { padding: 28px 20px; border-radius: 20px; }
            .bead-choices { gap: 28px; }
            .choice-bead { width: 52px; height: 52px; }
            .modal { padding: 32px 24px; border-radius: 20px; }

            :root {
                --bead-size: 26px;
                --bead-gap: 8px;
            }

            .date-label { font-size: 0.65rem; }
            .month-tick-label { font-size: 0.76rem; }
            .month-tick-line { width: 12px; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }
    </style>
</head>
<body>

<div class="page-container">
    <header>
        <h1>Дневник настроения</h1>
        <p>Нанизывай день за днём на нить жизни</p>
    </header>

    <div class="add-section" id="addSection"></div>

    <div class="chain-section" id="chainSection">
        <h2>Твоя нить</h2>
        <div class="chain-stats" id="chainStats"></div>
        <div id="chainArea"></div>
    </div>

    <!-- Month ticks — positioned to right edge of screen -->
    <div class="month-ticks" id="monthTicks"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
        <button class="modal-close" id="modalClose">✕</button>
        <div id="modalContent"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const STORAGE_KEY = 'bead-diary-entries';
    let selectedColor = null;
    let editMode = false;
    let hoveredIdx = -1;

    function getEntries() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
        catch { return []; }
    }
    function saveEntries(e) { localStorage.setItem(STORAGE_KEY, JSON.stringify(e)); }

    function getTodayKey() {
        const n = new Date();
        return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
    }

    function getTodayEntry() {
        return getEntries().find(e => e.date === getTodayKey()) || null;
    }

    function hasEntryToday() { return !!getTodayEntry(); }

    function formatDate(ds) {
        const d = new Date(ds + 'T00:00:00');
        const m = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
        const w = ['вс','пн','вт','ср','чт','пт','сб'];
        return `${d.getDate()} ${m[d.getMonth()]}, ${w[d.getDay()]}`;
    }

    function formatDateFull(ds) {
        const d = new Date(ds + 'T00:00:00');
        const m = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
        const w = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
        return `${d.getDate()} ${m[d.getMonth()]} ${d.getFullYear()}, ${w[d.getDay()]}`;
    }

    function formatTodayDisplay() {
        const n = new Date();
        const m = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
        return `${n.getDate()} ${m[n.getMonth()]} ${n.getFullYear()}`;
    }

    function monthYearLabel(ds) {
        const d = new Date(ds + 'T00:00:00');
        const m = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
        return `${m[d.getMonth()]} ${d.getFullYear()}`;
    }

    function getMonthKey(ds) {
        return ds.substring(0, 7);
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('visible');
        setTimeout(() => t.classList.remove('visible'), 2500);
    }

    function pluralize(n, one, few, many) {
        const m10 = n % 10, m100 = n % 100;
        if (m100 >= 11 && m100 <= 19) return many;
        if (m10 === 1) return one;
        if (m10 >= 2 && m10 <= 4) return few;
        return many;
    }

    function escapeHtml(str) {
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
    }

    // ---- Add Section ----
    function renderAddSection() {
        const section = document.getElementById('addSection');
        const todayEntry = getTodayEntry();

        if (todayEntry && !editMode) {
            const moodWord = todayEntry.color === 'white' ? 'белая' : 'черная';
            section.innerHTML = `
                <div class="already-added">
                    <div class="checkmark">✓</div>
                    <p>Сегодня на нити ${moodWord} бисеринка.${todayEntry.comment ? '<br><em style="opacity:0.6;font-size:0.85rem;">«' + escapeHtml(todayEntry.comment).substring(0,60) + (todayEntry.comment.length > 60 ? '…' : '') + '»</em>' : ''}</p>
                    <button class="edit-link" onclick="startEdit()">✎&ensp;Изменить сегодняшнюю</button>
                </div>
            `;
            return;
        }

        const isEditing = editMode && todayEntry;
        const preselect = isEditing ? todayEntry.color : null;
        const preComment = isEditing ? todayEntry.comment : '';
        selectedColor = preselect;

        section.innerHTML = `
            ${isEditing ? '<div class="edit-badge">✎ Редактирование</div>' : ''}
            <h2>${isEditing ? 'Изменить сегодняшний день' : 'Каким был сегодняшний день?'}</h2>
            <div class="date-display">${formatTodayDisplay()}</div>
            <div class="bead-choices">
                <div class="bead-choice ${preselect === 'white' ? 'selected' : ''}" data-color="white" onclick="selectColor('white')">
                    <div class="choice-bead white"></div>
                    <span class="choice-label">Белый</span>
                </div>
                <div class="bead-choice ${preselect === 'black' ? 'selected' : ''}" data-color="black" onclick="selectColor('black')">
                    <div class="choice-bead black"></div>
                    <span class="choice-label">Черный</span>
                </div>
            </div>
            <div class="comment-area">
                <textarea id="commentInput" placeholder="Что запомнилось сегодня? (необязательно)">${escapeHtml(preComment)}</textarea>
            </div>
            <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
                ${isEditing ? '<button class="add-btn" style="background:rgba(44,36,32,0.08);color:var(--text-muted);box-shadow:none;" onclick="cancelEdit()">Отмена</button>' : ''}
                <button class="add-btn" id="addBtn" onclick="saveBead()" ${preselect ? '' : 'disabled'}>
                    ${isEditing ? 'Сохранить изменения' : 'Нанизать бисеринку'}
                </button>
            </div>
        `;
    }

    function selectColor(color) {
        selectedColor = color;
        document.querySelectorAll('.bead-choice').forEach(el => {
            el.classList.toggle('selected', el.dataset.color === color);
        });
        const btn = document.getElementById('addBtn');
        if (btn) btn.disabled = false;
    }

    function startEdit() {
        editMode = true;
        renderAddSection();
        document.getElementById('addSection').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function cancelEdit() {
        editMode = false;
        selectedColor = null;
        renderAddSection();
    }

    function saveBead() {
        if (!selectedColor) return;
        const comment = document.getElementById('commentInput')?.value.trim() || '';
        const today = getTodayKey();
        const entries = getEntries();
        const idx = entries.findIndex(e => e.date === today);
        const isUpdate = idx !== -1;

        if (isUpdate) {
            entries[idx].color = selectedColor;
            entries[idx].comment = comment;
        } else {
            entries.push({ date: today, color: selectedColor, comment });
        }

        saveEntries(entries);
        editMode = false;
        renderAddSection();
        renderChain(isUpdate ? 'update' : 'new');
        showToast(isUpdate ? 'Бисеринка обновлена' : 'Бисеринка добавлена');
    }

    // ---- Chain ----
    function renderChain(animType = false) {
        const entries = getEntries();
        const area = document.getElementById('chainArea');
        const stats = document.getElementById('chainStats');
        const monthTicks = document.getElementById('monthTicks');
        const today = getTodayKey();

        if (entries.length === 0) {
            stats.textContent = '';
            area.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">◯</div>
                    <p>Нить пуста. Добавь первую бисеринку,<br>чтобы начать свой дневник.</p>
                </div>
            `;
            monthTicks.innerHTML = '';
            return;
        }

        const wc = entries.filter(e => e.color === 'white').length;
        const bc = entries.filter(e => e.color === 'black').length;
        stats.textContent = `${entries.length} ${pluralize(entries.length,'бисеринка','бисеринки','бисеринок')} · ${wc} белых · ${bc} черных`;

        // Determine first bead of each month
        const monthFirstIdx = {};
        entries.forEach((entry, i) => {
            const mk = getMonthKey(entry.date);
            if (!(mk in monthFirstIdx)) {
                monthFirstIdx[mk] = i;
            }
        });

        // Build bead rows
        let html = '<div class="chain-track" id="chainTrack"><div class="thread-line" id="threadLine"></div>';

        entries.forEach((entry, i) => {
            const isLast = i === entries.length - 1;
            const isToday = entry.date === today;

            let beadClasses = 'bead-item';
            if (entry.comment) beadClasses += ' has-comment';
            if (isToday) beadClasses += ' is-today';

            let beadStyle = '';
            if (animType === 'new' && isLast) {
                beadClasses += ' new-bead';
            } else if (animType === 'update' && isToday) {
                beadClasses += ' updated-bead';
            } else if (!animType) {
                beadStyle = `opacity:0;animation:beadAppear 0.5s cubic-bezier(0.34,1.56,0.64,1) ${i * 0.04}s forwards;`;
            }

            html += `<div class="bead-row" data-row-idx="${i}">
                <span class="date-label" id="dlabel-${i}">${formatDate(entry.date)}</span>
                <div class="${beadClasses}" style="${beadStyle}"
                    data-idx="${i}"
                    onmouseenter="showDate(${i})"
                    onmouseleave="hideDate(${i})"
                    onclick="openModal(${i})">
                    <div class="bead-sphere ${entry.color}"></div>
                </div>
            </div>`;
        });

        html += '</div>';
        area.innerHTML = html;

        // Position month ticks on right side of screen
        requestAnimationFrame(() => {
            const track = document.getElementById('chainTrack');
            const threadLine = document.getElementById('threadLine');
            if (!track) return;

            // Set thread height
            if (threadLine) {
                threadLine.style.height = track.scrollHeight + 'px';
            }

            // Position month ticks relative to the track
            const trackRect = track.getBoundingClientRect();
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            const trackTop = trackRect.top + scrollTop;

            let ticksHtml = '';

            Object.keys(monthFirstIdx).forEach(mk => {
                const idx = monthFirstIdx[mk];
                const row = track.querySelector(`[data-row-idx="${idx}"]`);
                if (!row) return;

                const rowRect = row.getBoundingClientRect();
                const rowTop = rowRect.top + scrollTop;
                const offsetFromTrack = rowTop - trackTop + rowRect.height / 2;

                ticksHtml += `<div class="month-tick" style="top:${offsetFromTrack}px;">
                    <span class="month-tick-label">${monthYearLabel(entries[idx].date)}</span>
                    <div class="month-tick-line"></div>
                </div>`;
            });

            monthTicks.innerHTML = ticksHtml;

            // Position the month ticks container
            const pageWidth = document.documentElement.clientWidth;
            const rightMargin = 0;
            monthTicks.style.right = rightMargin + 'px';
            monthTicks.style.top = trackTop + 'px';
            monthTicks.style.height = track.scrollHeight + 'px';
            monthTicks.style.position = 'absolute';
            monthTicks.style.left = 'auto';
        });
    }

    function showDate(idx) {
        const el = document.getElementById('dlabel-' + idx);
        if (el) el.classList.add('visible');
    }

    function hideDate(idx) {
        const el = document.getElementById('dlabel-' + idx);
        if (el) el.classList.remove('visible');
    }

    function showDate(idx) {
        const el = document.getElementById('dlabel-' + idx);
        if (el) el.classList.add('visible');
    }

    function hideDate(idx) {
        const el = document.getElementById('dlabel-' + idx);
        if (el) el.classList.remove('visible');
    }

    // ---- Modal ----
    function openModal(idx) {
        const entries = getEntries();
        const entry = entries[idx];
        if (!entry) return;

        const overlay = document.getElementById('modalOverlay');
        const content = document.getElementById('modalContent');
        const today = getTodayKey();
        const isToday = entry.date === today;
        const moodLabel = entry.color === 'white' ? 'Хороший день' : 'Плохой день';

        content.innerHTML = `
            ${isToday ? '<div style="text-align:center;"><span class="today-badge">Сегодня</span></div>' : ''}
            <div class="modal-bead">
                <div class="bead-sphere ${entry.color}"></div>
            </div>
            <div class="modal-date">${formatDateFull(entry.date)}</div>
            <div class="modal-mood">${moodLabel}</div>
            ${entry.comment
                ? `<div class="modal-comment">${escapeHtml(entry.comment)}</div>`
                : `<div class="modal-no-comment">Без заметки</div>`}
            <div class="modal-bead-number">Бисеринка #${idx + 1} из ${entries.length}</div>
            <div class="modal-actions">
                ${isToday ? `<button class="modal-edit-btn" onclick="editFromModal()">✎ Редактировать</button>` : ''}
                <button class="modal-delete" onclick="deleteBead('${entry.date}')">Удалить</button>
            </div>
        `;

        overlay.classList.add('active');
    }

    function editFromModal() {
        closeModal();
        setTimeout(() => startEdit(), 300);
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('active');
    }

    function deleteBead(date) {
        if (!confirm('Удалить эту бисеринку?')) return;
        let entries = getEntries().filter(e => e.date !== date);
        saveEntries(entries);
        editMode = false;
        closeModal();
        renderAddSection();
        renderChain();
        showToast('Бисеринка удалена');
    }

    // Events
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalOverlay').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeModal();
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // Touch support for dates
    document.addEventListener('touchstart', function(e) {
        const bead = e.target.closest('.bead-item');
        if (bead) {
            const idx = bead.dataset.idx;
            showDate(parseInt(idx));
        }
    }, { passive: true });

    document.addEventListener('touchend', function() {
        document.querySelectorAll('.date-label.visible').forEach(el => el.classList.remove('visible'));
    }, { passive: true });

    // Init
    renderAddSection();
    renderChain();

    window.addEventListener('resize', () => {
        renderChain();
    });
</script>

</body>
